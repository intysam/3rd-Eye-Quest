<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3rd Eye Quest</title>

<style>
:root {
  --glass: rgba(20, 20, 35, 0.55);
  --text: #f5f5f5;
  --accent: #c4a484;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  background-color: #090d18;
}

/* BACKGROUND IMAGE */
.bg {
  position: fixed;
  inset: 0;
  background: url('background.png') center 20% / cover no-repeat;
  z-index: -3;
}

}
  .bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.85) 0%,
    rgba(0,0,0,0.5) 40%,
    rgba(0,0,0,0.2) 60%,
    rgba(0,0,0,0.8) 100%
  );
}

  .bg {
  position: fixed;
  inset: 0;
  background: url('background.png') center 20% / cover no-repeat;
  z-index: -3;
  animation: bgDrift 60s ease-in-out infinite alternate;
}
  
/* FLOATING PLANETS */
.planets {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -2;
  overflow: hidden;
}

.planet {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.22);
  border: 1px solid rgba(255,255,255,0.18);
  box-shadow: 0 0 24px rgba(255,255,255,0.12);
}

.planet.small {
  width: 44px;
  height: 44px;
  animation: drift1 8s ease-in-out infinite;
}

.planet.medium {
  width: 72px;
  height: 72px;
  animation: drift2 10s ease-in-out infinite;
}

.planet.large {
  width: 110px;
  height: 110px;
  animation: drift3 12s ease-in-out infinite;
}

@keyframes drift1 {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(20px, -16px); }
  50%  { transform: translate(-14px, -30px); }
  75%  { transform: translate(22px, -8px); }
  100% { transform: translate(0px, 0px); }
}

@keyframes drift2 {
  0%   { transform: translate(0px, 0px); }
  25%  { transform: translate(-22px, 10px); }
  50%  { transform: translate(-30px, -20px); }
  75%  { transform: translate(14px, -24px); }
  100% { transform: translate(0px, 0px); }
}

@keyframes drift3 {
  0%   { transform: translate(0px, 0px); }
  20%  { transform: translate(18px, -12px); }
  50%  { transform: translate(28px, 14px); }
  80%  { transform: translate(-16px, -24px); }
  100% { transform: translate(0px, 0px); }
}

  @keyframes bgDrift {
  0% {
    transform: scale(1) translate(0px, 0px);
  }
  100% {
    transform: scale(1.05) translate(-10px, -10px);
  }
}

  @keyframes twinkle {
  0% { opacity: 0.3; }
  100% { opacity: 0.6; }
}
  
  .stars {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1.5px 1.5px at 70% 60%, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 40% 80%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.5), transparent);
  animation: twinkle 6s infinite ease-in-out alternate;
  opacity: 0.4;
}
  
@media (prefers-reduced-motion: reduce) {
  .planet {
    animation: none !important;
  }
}
  
/* DARK GRADIENT OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.12), rgba(0,0,0,0.58));
  z-index: -1;
}

/* RIGHT SIDE PANEL */
.panel {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: 320px;
  backdrop-filter: blur(16px);
  background: var(--glass);
  padding: 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  border-left: 1px solid rgba(255,255,255,0.08);
}

/* TITLE */
.title {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 25px;
}

/* BUTTONS */
.btn {
  padding: 14px;
  border-radius: 999px;
  text-align: center;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  transition: all 0.3s ease;
}

.btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}

/* CENTER AREA */
.center {
  position: absolute;
  left: 0;
  right: 320px;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* MAIN TITLE FLOAT */
.center h1 {
  font-size: 54px;
  letter-spacing: 6px;
  opacity: 0.9;
  text-align: center;
  text-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* MOBILE */
@media (max-width: 768px) {
  .panel {
    width: 100%;
    height: auto;
    bottom: 0;
    top: auto;
    flex-direction: row;
    overflow-x: auto;
    padding: 20px;
  }

  .center {
    right: 0;
  }

  .center h1 {
    font-size: 34px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .planet {
    animation: none !important;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="planets" aria-hidden="true">
  <div class="planet small" style="top: 14%; left: 10%;"></div>
  <div class="planet medium" style="top: 22%; left: 68%;"></div>
  <div class="planet large" style="top: 62%; left: 14%;"></div>
  <div class="planet small" style="top: 74%; left: 58%;"></div>
  <div class="planet medium" style="top: 48%; left: 82%;"></div>
</div>

<div class="overlay"></div>

<div class="center">
  <h1>3RD EYE QUEST</h1>
</div>

<div class="panel">
  <div class="title">3rd Eye Quest</div>
  <div class="subtitle">Unlock your intuition. Probe the truth.</div>

  <a href="assist.html" class="btn">Assist Guide</a>
  <a href="#how" class="btn">How to Play</a>
  <a href="#updates" class="btn">Join Updates</a>
  <a href="#community" class="btn">Community Sessions</a>
</div>

<div class="planets" aria-hidden="true">
  <div class="planet small" style="top: 14%; left: 10%; animation-delay: -3s;"></div>
  <div class="planet medium" style="top: 22%; left: 68%; animation-delay: -11s;"></div>
  <div class="planet large" style="top: 62%; left: 14%; animation-delay: -7s;"></div>
  <div class="planet small" style="top: 74%; left: 58%; animation-delay: -15s;"></div>
  <div class="planet medium" style="top: 48%; left: 82%; animation-delay: -20s;"></div>
</div>

  <div class="bg"></div>
<div class="stars"></div>
  
</body>
</html>
