<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3rd Eye Quest</title>

<style>
:root {
  --glass: rgba(20, 20, 35, 0.55);
  --panel: rgba(14, 17, 32, 0.82);
  --text: #f5f5f5;
  --accent: #c4a484;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  background-color: #090d18;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: url('background.png') center 20% / cover no-repeat;
  z-index: -3;
  animation: bgDrift 60s ease-in-out infinite alternate;
}

.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.85) 0%,
    rgba(0,0,0,0.5) 40%,
    rgba(0,0,0,0.2) 60%,
    rgba(0,0,0,0.8) 100%
  );
}

.stars {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1.5px 1.5px at 70% 60%, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 40% 80%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.5), transparent);
  animation: twinkle 6s infinite ease-in-out alternate;
  opacity: 0.4;
}

.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.12), rgba(0,0,0,0.58));
  z-index: -1;
}

/* CENTER TITLE */
.center {
  position: absolute;
  left: 0;
  right: 320px;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

.center h1 {
  font-size: 54px;
  letter-spacing: 6px;
  text-align: center;
  text-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* RIGHT MENU */
.panel {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: 320px;
  backdrop-filter: blur(16px);
  background: var(--glass);
  padding: 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  border-left: 1px solid rgba(255,255,255,0.08);
  z-index: 5;
}

.title {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 25px;
}

.btn {
  padding: 14px;
  border-radius: 999px;
  text-align: center;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  background: transparent;
  cursor: pointer;
  font: inherit;
  transition: all 0.3s ease;
}

.btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}

/* POPUP SYSTEM */
.modal-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.42);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
  z-index: 10;
}

.modal-backdrop.active {
  opacity: 1;
  pointer-events: auto;
}

.info-panel {
  position: fixed;
  top: 0;
  right: 0;
  width: min(520px, 92vw);
  height: 100vh;
  background: var(--panel);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(255,255,255,0.12);
  box-shadow: -30px 0 80px rgba(0,0,0,0.42);
  padding: 42px 34px;
  transform: translateX(105%);
  transition: transform 0.38s ease;
  z-index: 11;
  overflow-y: auto;
}

.info-panel.active {
  transform: translateX(0);
}

.close-btn {
  position: absolute;
  top: 18px;
  right: 20px;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.18);
  background: rgba(255,255,255,0.06);
  color: white;
  font-size: 22px;
  cursor: pointer;
}

.info-panel h2 {
  color: var(--accent);
  font-size: 28px;
  margin-bottom: 14px;
  letter-spacing: 1px;
}

.info-panel p {
  line-height: 1.7;
  opacity: 0.88;
  margin-bottom: 18px;
}

.info-panel ol,
.info-panel ul {
  padding-left: 22px;
  line-height: 1.8;
  margin-bottom: 20px;
}

.info-panel li {
  margin-bottom: 10px;
}

.panel-link {
  display: inline-block;
  margin-top: 10px;
  color: white;
  text-decoration: none;
  border: 1px solid rgba(255,255,255,0.25);
  border-radius: 999px;
  padding: 12px 18px;
}

.email-box {
  width: 100%;
  padding: 14px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.08);
  color: white;
  margin: 10px 0;
}

.email-box::placeholder {
  color: rgba(255,255,255,0.6);
}

@keyframes bgDrift {
  0% { transform: scale(1) translate(0, 0); }
  100% { transform: scale(1.05) translate(-10px, -10px); }
}

@keyframes twinkle {
  0% { opacity: 0.3; }
  100% { opacity: 0.6; }
}

/* MOBILE */
@media (max-width: 768px) {
  .panel {
    width: 100%;
    height: auto;
    bottom: 0;
    top: auto;
    flex-direction: row;
    overflow-x: auto;
    padding: 20px;
  }

  .title,
  .subtitle {
    display: none;
  }

  .btn {
    min-width: 145px;
  }

  .center {
    right: 0;
    bottom: 130px;
  }

  .center h1 {
    font-size: 34px;
  }

  .info-panel {
    width: 100%;
  }

  .info-panel {
  overflow-y: auto;
  padding-bottom: 60px;
}
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="stars"></div>
<div class="overlay"></div>

<div class="center">
  <h1>3RD EYE QUEST</h1>
</div>

<div class="panel">
  <div class="title">3rd Eye Quest</div>
  <div class="subtitle">Unlock your intuition. Probe the truth.</div>

  <a href="assist.html" class="btn">Assist Guide</a>
  <button class="btn" data-panel="how">How to Play</button>
  <button class="btn" data-panel="updates">Join Updates</button>
  <button class="btn" data-panel="community">Community Sessions</button>
</div>

<div class="modal-backdrop" id="modalBackdrop"></div>

<aside class="info-panel" id="communityPanel">
  <button class="close-btn" data-close>&times;</button>

  <h2>Enter the Signal</h2>
  <p>Share your impressions, sketches, and perception.</p>

  <iframe 
    data-tally-src="https://tally.so/embed/ja0PbR?alignLeft=1&hideTitle=1&transparentBackground=1&dynamicHeight=1"
    loading="lazy"
    width="100%" 
    height="600"
    frameborder="0"
    marginheight="0"
    marginwidth="0"
    title="3rd Eye Quest Session Submission"
    style="border-radius: 12px; margin-top: 20px;">
  </iframe>

  <script>
    var d = document,
    w = "https://tally.so/widgets/embed.js",
    v = function () {
      if (typeof Tally !== "undefined") {
        Tally.loadEmbeds();
      } else {
        d.querySelectorAll("iframe[data-tally-src]:not([src])").forEach(function (e) {
          e.src = e.dataset.tallySrc;
        });
      }
    };
    if (typeof Tally !== "undefined") {
      v();
    } else if (d.querySelector('script[src="' + w + '"]') == null) {
      var s = d.createElement("script");
      s.src = w;
      s.onload = v;
      s.onerror = v;
      d.body.appendChild(s);
    }
  </script>
</aside>

  <script src="https://tally.so/widgets/embed.js"></script>
  
<script>
const backdrop = document.getElementById("modalBackdrop");
const panels = {
  how: document.getElementById("howPanel"),
  updates: document.getElementById("updatesPanel"),
  community: document.getElementById("communityPanel")
};

function closePanels() {
  Object.values(panels).forEach(panel => panel.classList.remove("active"));
  backdrop.classList.remove("active");
}

function openPanel(name) {
  closePanels();
  panels[name].classList.add("active");
  backdrop.classList.add("active");
}

document.querySelectorAll("[data-panel]").forEach(button => {
  button.addEventListener("click", () => openPanel(button.dataset.panel));
});

document.querySelectorAll("[data-close]").forEach(button => {
  button.addEventListener("click", closePanels);
});

backdrop.addEventListener("click", closePanels);

document.addEventListener("keydown", (event) => {
  if (event.key === "Escape") closePanels();
});
</script>

</body>
</html>
