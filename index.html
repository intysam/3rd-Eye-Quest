<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3rd Eye Quest</title>

<style>
:root {
  --glass: rgba(20, 20, 35, 0.55);
  --text: #f5f5f5;
  --accent: #c4a484;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
}

/* BACKGROUND IMAGE */
.bg {
  position: fixed;
  inset: 0;
  background: url('space-bg.png') center/cover no-repeat;
  z-index: -2;
}

/* DARK GRADIENT OVERLAY (for readability) */
.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.75));
  z-index: -1;
}

/* RIGHT SIDE PANEL */
.panel {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: 320px;

  backdrop-filter: blur(16px);
  background: var(--glass);

  padding: 50px 30px;

  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;

  border-left: 1px solid rgba(255,255,255,0.08);
}

/* TITLE */
.title {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 25px;
}

/* BUTTONS */
.btn {
  padding: 14px;
  border-radius: 999px;
  text-align: center;
  text-decoration: none;
  color: white;

  border: 1px solid rgba(255,255,255,0.25);

  transition: all 0.3s ease;
}

/* BUTTON HOVER */
.btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}

/* CENTER AREA */
.center {
  position: absolute;
  left: 0;
  right: 320px;
  top: 0;
  bottom: 0;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* MAIN TITLE FLOAT */
.center h1 {
  font-size: 54px;
  letter-spacing: 6px;
  opacity: 0.9;
  text-align: center;

  text-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* MOBILE */
@media (max-width: 768px) {

  .panel {
    width: 100%;
    height: auto;
    bottom: 0;
    top: auto;
    flex-direction: row;
    overflow-x: auto;
  }

  .center {
    right: 0;
  }

  .center h1 {
    font-size: 34px;
  }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<!-- OVERLAY -->
<div class="overlay"></div>

<!-- MAIN CENTER -->
<div class="center">
  <h1>3RD EYE QUEST</h1>
</div>

<!-- RIGHT PANEL -->
<div class="panel">
  <div class="title">3rd Eye Quest</div>
  <div class="subtitle">Unlock your intuition. Probe the truth.</div>

  <a href="assist.html" class="btn">Assist Guide</a>
  <a href="#how" class="btn">How to Play</a>
  <a href="#updates" class="btn">Join Updates</a>
  <a href="#community" class="btn">Community Sessions</a>
</div>

</body>
</html>
