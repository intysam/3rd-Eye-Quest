<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3rd Eye Quest</title>

<style>
:root {
  --glass: rgba(20, 20, 35, 0.55);
  --text: #f5f5f5;
  --accent: #c4a484;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  background-color: #090d18;
}

/* BACKGROUND IMAGE */
.bg {
  position: fixed;
  inset: 0;
  background: url('space-bg.png') center center / contain no-repeat;
  background-color: #090d18;
  z-index: -3;
}

/* FLOATING PLANETS */
.planets {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: -2;
  overflow: hidden;
}

.planet {
  position: absolute;
  border-radius: 50%;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.28), rgba(255,255,255,0.04) 45%, rgba(255,255,255,0) 70%);
  border: 1px solid rgba(255,255,255,0.06);
  box-shadow:
    inset 0 0 22px rgba(255,255,255,0.04),
    0 0 28px rgba(255,255,255,0.05);
  opacity: 0.18;
  animation: driftPlanet ease-in-out infinite;
}

.planet::after {
  content: "";
  position: absolute;
  inset: 12%;
  border-radius: 50%;
  border: 1px solid rgba(255,255,255,0.05);
  filter: blur(0.5px);
}

.planet.small {
  width: 44px;
  height: 44px;
  animation-duration: 28s;
}

.planet.medium {
  width: 72px;
  height: 72px;
  animation-duration: 40s;
}

.planet.large {
  width: 110px;
  height: 110px;
  animation-duration: 52s;
}

@keyframes driftPlanet {
  0%   { transform: translate3d(0, 0, 0); }
  25%  { transform: translate3d(8px, -10px, 0); }
  50%  { transform: translate3d(-6px, -18px, 0); }
  75%  { transform: translate3d(10px, -8px, 0); }
  100% { transform: translate3d(0, 0, 0); }
}

/* DARK GRADIENT OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center, rgba(0,0,0,0.12), rgba(0,0,0,0.58));
  z-index: -1;
}

/* RIGHT SIDE PANEL */
.panel {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: 320px;
  backdrop-filter: blur(16px);
  background: var(--glass);
  padding: 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  border-left: 1px solid rgba(255,255,255,0.08);
}

/* TITLE */
.title {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 25px;
}

/* BUTTONS */
.btn {
  padding: 14px;
  border-radius: 999px;
  text-align: center;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  transition: all 0.3s ease;
}

.btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}

/* CENTER AREA */
.center {
  position: absolute;
  left: 0;
  right: 320px;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

/* MAIN TITLE FLOAT */
.center h1 {
  font-size: 54px;
  letter-spacing: 6px;
  opacity: 0.9;
  text-align: center;
  text-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* MOBILE */
@media (max-width: 768px) {
  .panel {
    width: 100%;
    height: auto;
    bottom: 0;
    top: auto;
    flex-direction: row;
    overflow-x: auto;
    padding: 20px;
  }

  .center {
    right: 0;
  }

  .center h1 {
    font-size: 34px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .planet {
    animation: none !important;
  }
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="planets" aria-hidden="true">
  <div class="planet small" style="top: 14%; left: 10%;"></div>
  <div class="planet medium" style="top: 22%; left: 68%;"></div>
  <div class="planet large" style="top: 62%; left: 14%;"></div>
  <div class="planet small" style="top: 74%; left: 58%;"></div>
  <div class="planet medium" style="top: 48%; left: 82%;"></div>
</div>

<div class="overlay"></div>

<div class="center">
  <h1>3RD EYE QUEST</h1>
</div>

<div class="panel">
  <div class="title">3rd Eye Quest</div>
  <div class="subtitle">Unlock your intuition. Probe the truth.</div>

  <a href="assist.html" class="btn">Assist Guide</a>
  <a href="#how" class="btn">How to Play</a>
  <a href="#updates" class="btn">Join Updates</a>
  <a href="#community" class="btn">Community Sessions</a>
</div>

</body>
</html>
