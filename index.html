<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3rd Eye Quest</title>

<style>
:root {
  --glass: rgba(20, 20, 35, 0.55);
  --text: #f5f5f5;
}

/* RESET */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, -apple-system, sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  background-color: #090d18;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: url('background.png') center 20% / cover no-repeat;
  z-index: -3;
  animation: bgDrift 60s ease-in-out infinite alternate;
}

/* GRADIENT OVERLAY */
.bg::after {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to right,
    rgba(0,0,0,0.85) 0%,
    rgba(0,0,0,0.5) 40%,
    rgba(0,0,0,0.2) 60%,
    rgba(0,0,0,0.8) 100%
  );
}

/* STAR TWINKLE */
.stars {
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background-image:
    radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.6), transparent),
    radial-gradient(1.5px 1.5px at 70% 60%, rgba(255,255,255,0.5), transparent),
    radial-gradient(2px 2px at 40% 80%, rgba(255,255,255,0.4), transparent),
    radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.5), transparent);
  animation: twinkle 6s infinite ease-in-out alternate;
  opacity: 0.4;
}

/* OVERLAY */
.overlay {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.12), rgba(0,0,0,0.58));
  z-index: -1;
}

/* RIGHT PANEL */
.panel {
  position: absolute;
  right: 0;
  top: 0;
  height: 100%;
  width: 320px;
  backdrop-filter: blur(16px);
  background: var(--glass);
  padding: 50px 30px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 20px;
  border-left: 1px solid rgba(255,255,255,0.08);
}

/* TEXT */
.title {
  font-size: 30px;
  font-weight: 600;
  letter-spacing: 2px;
}

.subtitle {
  font-size: 14px;
  opacity: 0.8;
  margin-bottom: 25px;
}

/* BUTTONS */
.btn {
  padding: 14px;
  border-radius: 999px;
  text-align: center;
  text-decoration: none;
  color: white;
  border: 1px solid rgba(255,255,255,0.25);
  transition: all 0.3s ease;
}

.btn:hover {
  background: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}

/* CENTER */
.center {
  position: absolute;
  left: 0;
  right: 320px;
  top: 0;
  bottom: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* TITLE */
.center h1 {
  font-size: 54px;
  letter-spacing: 6px;
  text-shadow: 0 0 30px rgba(0,0,0,0.6);
}

/* ANIMATIONS */
@keyframes bgDrift {
  0% { transform: scale(1) translate(0, 0); }
  100% { transform: scale(1.05) translate(-10px, -10px); }
}

@keyframes twinkle {
  0% { opacity: 0.3; }
  100% { opacity: 0.6; }
}

/* MOBILE */
@media (max-width: 768px) {
  .panel {
    width: 100%;
    height: auto;
    bottom: 0;
    top: auto;
    flex-direction: row;
    overflow-x: auto;
  }

  .center {
    right: 0;
  }

  .center h1 {
    font-size: 34px;
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="stars"></div>
<div class="overlay"></div>

<div class="center">
  <h1>3RD EYE QUEST</h1>
</div>

<div class="panel">
  <div class="title">3rd Eye Quest</div>
  <div class="subtitle">Unlock your intuition. Probe the truth.</div>

  <a href="assist.html" class="btn">Assist Guide</a>
  <a href="#" class="btn">How to Play</a>
  <a href="#" class="btn">Join Updates</a>
  <a href="#" class="btn">Community Sessions</a>
</div>

</body>
</html>
