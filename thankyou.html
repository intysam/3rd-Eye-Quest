<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signal Received | 3rd Eye Quest</title>

<style>
:root {
  --text: #f5f5f5;
  --accent: #c4a484;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui, sans-serif;
  color: var(--text);
  height: 100vh;
  overflow: hidden;
  background: #090d18;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background:
    url('background.png') center center / cover no-repeat;
  z-index: -3;
  animation: drift 40s ease-in-out infinite alternate;
}

.overlay {
  position: fixed;
  inset: 0;
  background:
    radial-gradient(circle at center,
    rgba(0,0,0,0.15),
    rgba(0,0,0,0.72));
  z-index: -2;
}

/* CONTENT */
.wrap {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 30px;
}

.content {
  max-width: 700px;
  animation: fadeUp 1.2s ease;
}

h1 {
  font-size: clamp(48px, 8vw, 88px);
  letter-spacing: 8px;
  margin-bottom: 24px;
  text-shadow: 0 0 30px rgba(0,0,0,0.55);
}

p {
  font-size: 18px;
  line-height: 1.8;
  opacity: 0.92;
  margin-bottom: 34px;
}

.btn {
  display: inline-block;
  padding: 15px 28px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.22);
  color: white;
  text-decoration: none;
  transition: all 0.3s ease;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.05);
}

.btn:hover {
  transform: translateY(-2px);
  background: rgba(255,255,255,0.1);
}

/* SMALL SIGNAL GLOW */
.signal {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  margin: 0 auto 26px;
  box-shadow:
    0 0 12px var(--accent),
    0 0 32px var(--accent);
  animation: pulse 2.5s infinite;
}

@keyframes pulse {
  0% { transform: scale(1); opacity: 0.8; }
  50% { transform: scale(1.6); opacity: 1; }
  100% { transform: scale(1); opacity: 0.8; }
}

@keyframes drift {
  0% { transform: scale(1) translate(0,0); }
  100% { transform: scale(1.05) translate(-12px,-12px); }
}

@keyframes fadeUp {
  from {
    opacity: 0;
    transform: translateY(24px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="wrap">
  <div class="content">

    <div class="signal"></div>

    <h1>SIGNAL RECEIVED</h1>

    <p>
      You are now connected to the 3rd Eye Quest transmission.<br><br>

      Deck updates, future missions, launch access, and experimental sessions
      will arrive soon.
    </p>

    <a href="index.html" class="btn">Return to Portal</a>

  </div>
</div>

</body>
</html>
